<!DOCTYPE html>=device-width, initial-scale=1.0" />
  <title>30s crisis</title>
  <style>
    :root {
      --gb0: #e0f8d0;
      --gb1: #88c070;
      --gb2: #346856;
      --gb3: #081820;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, var(--gb0), #c7eab3);
      font-family: monospace;
    }

    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 20px;
    }

    canvas {
      width: min(90vw, 800px);
      height: auto;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 6px solid var(--gb3);
      background: var(--gb0);
      box-shadow: 0 0 0 6px var(--gb1), 0 16px 40px rgba(8, 24, 32, 0.18);
    }

    .caption {
      color: var(--gb3);
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="wrap">

<head>
  <meta charset="UTF-8" />
